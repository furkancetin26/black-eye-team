<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header></header>

    <main>
      <section class="section-fourth">
        <h2 class="mentors-header">
          Our <span class="our-mentors-span">Mentors</span>
        </h2>
        <div class="our-mentors-div">
          <ul class="mentors-list">
            <div class="mentors-team-div">
              <li class="mentors-card">
                <img
                  class="mentors-image"
                  src="./images/emilia.jpg"
                  alt="emilia smith"
                  width="180"
                  height="180"
                />
                <div class="mentors-info">
                  <h3 class="mentors-img-head">Emilia Smith</h3>
                  <p class="mentors-img-text">1.5 years of experience</p>
                </div>
              </li>
            </div>
            <div class="mentors-team-div">
              <li class="mentors-card">
                <img
                  class="mentors-image"
                  src="./images/alex.jpg"
                  alt="alex lebedev"
                  width="180"
                  height="180"
                />
                <div class="mentors-info">
                  <h3 class="mentors-img-head">Alex Lebedev</h3>
                  <p class="mentors-img-text">3.5 years of experience</p>
                </div>
              </li>
            </div>
            <div class="mentors-team-div">
              <li class="mentors-card">
                <img
                  class="mentors-image"
                  src="./images/mia.jpg"
                  alt="mia dubrovska"
                  width="180"
                  height="180"
                />
                <div class="mentors-info">
                  <h3 class="mentors-img-head">Mia Dubrovska</h3>
                  <p class="mentors-img-text">2.0 years of experience</p>
                </div>
              </li>
            </div>
            <div class="mentors-team-div">
              <li class="mentors-card">
                <img
                  class="mentors-image"
                  src="./images/eliot.jpg"
                  alt="eliot kovaley"
                  width="180"
                  height="180"
                />
                <div class="mentors-info">
                  <h3 class="mentors-img-head">Eliot Kovalev</h3>
                  <p class="mentors-img-text">4.0 years of experience</p>
                </div>
              </li>
            </div>
          </ul>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
